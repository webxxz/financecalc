<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMI Calculator for India - Calculate Loan EMI, Total Interest, Total Payment</title>
    <meta name="author" content="FinanceCalc.in">
    <meta name="description" content="Calculate your monthly EMI for home loan, car loan, or personal loan in India. Get details on total interest payable and total payment with our easy-to-use EMI calculator.">
    <meta name="keywords" content="EMI calculator, loan EMI, monthly EMI, home loan EMI, car loan EMI, personal loan EMI, EMI calculation, India">
   <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>EMI Calculator</h1>
        <div class="input-group">
            <label for="loanAmount">Loan Amount (₹):</label>
            <input type="number" id="loanAmount" placeholder="e.g., 100000" required>
        </div>
        <div class="input-group">
            <label for="interestRate">Interest Rate (% p.a.):</label>
            <input type="number" id="interestRate" placeholder="e.g., 8.5" step="0.01" required>
        </div>
        <div class="input-group">
            <label for="loanTenure">Loan Tenure:</label>
            <input type="number" id="loanTenure" placeholder="e.g., 5" required>
            <select id="tenureUnit">
                <option value="years">Years</option>
                <option value="months">Months</option>
            </select>
        </div>
        <button onclick="calculateEMI()">Calculate EMI</button>
        <div class="results">
            <h2>Calculation Results</h2>
            <p>Monthly EMI: <span id="monthlyEMI">₹ 0</span></p>
            <p>Total Interest Payable: <span id="totalInterest">₹ 0</span></p>
            <p>Total Payment (Principal + Interest): <span id="totalPayment">₹ 0</span></p>
        </div>
        <div class="formula">
            <h2>EMI Formula</h2>
            <p>EMI = [P x R x (1+R)^N] / [(1+R)^N-1]</p>
            <p>Where:</p>
            <ul>
                <li>P = Principal Loan Amount</li>
                <li>R = Monthly Interest Rate</li>
                <li>N = Number of Monthly Installments</li>
            </ul>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
