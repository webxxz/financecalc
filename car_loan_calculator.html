<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Loan EMI Calculator India - Calculate Monthly Payments</title>
    <meta name="author" content="FinanceCalc.in">
    <meta name="description" content="Calculate your car loan EMI in India. Get details on monthly payments, total interest, and total payment for your new or used car loan.">
    <meta name="keywords" content="car loan EMI calculator, auto loan EMI, car finance, India, monthly car payment">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="car_loan_style.css">
</head>
<body>
    <div class="container">
        <h1>Car Loan EMI Calculator</h1>
        <div class="input-group">
            <label for="carModel">Car Model:</label>
            <select id="carModel">
                <option value="">Select a Car Model</option>
                <option value="Maruti Suzuki Swift">Maruti Suzuki Swift</option>
                <option value="Hyundai Creta">Hyundai Creta</option>
                <option value="Tata Nexon">Tata Nexon</option>
                <option value="Mahindra XUV700">Mahindra XUV700</option>
                <option value="Honda City">Honda City</option>
            </select>
        </div>
        <div class="input-group">
            <label for="carLoanAmount">Loan Amount (₹):</label>
            <input type="number" id="carLoanAmount" placeholder="e.g., 500000" required>
        </div>
        <div class="input-group">
            <label for="carInterestRate">Interest Rate (% p.a.):</label>
            <input type="number" id="carInterestRate" placeholder="e.g., 9.5" step="0.01" required>
        </div>
        <div class="input-group">
            <label for="carLoanTenure">Loan Tenure:</label>
            <input type="number" id="carLoanTenure" placeholder="e.g., 5" required>
            <select id="carTenureUnit">
                <option value="years">Years</option>
                <option value="months">Months</option>
            </select>
        </div>
        <button onclick="calculateCarLoanEMI()">Calculate EMI</button>
        <div class="results">
            <h2>Calculation Results</h2>
            <p>Monthly EMI: <span id="carMonthlyEMI">₹ 0</span></p>
            <p>Total Interest Payable: <span id="carTotalInterest">₹ 0</span></p>
            <p>Total Payment (Principal + Interest): <span id="carTotalPayment">₹ 0</span></p>
        </div>
        <div class="formula">
            <h2>EMI Formula</h2>
            <p>EMI = [P x R x (1+R)^N] / [(1+R)^N-1]</p>
            <p>Where:</p>
            <ul>
                <li>P = Principal Loan Amount</li>
                <li>R = Monthly Interest Rate</li>
                <li>N = Number of Monthly Installments</li>
            </ul>
        </div>
    </div>
    <script src="car_loan_script.js"></script>
</body>
</html>
